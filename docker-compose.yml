services:
  revisao-posts:
    build: .
    container_name: revisao-posts
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5}
      - OPENAI_REASONING_EFFORT=${OPENAI_REASONING_EFFORT:-medium}
      - OPENAI_MAX_TOKENS=${OPENAI_MAX_TOKENS:-16000}
      - OPENAI_TIMEOUT_MS=${OPENAI_TIMEOUT_MS:-90000}
      - CLICKUP_API_TOKEN=${CLICKUP_API_TOKEN}
      - CLICKUP_WORKSPACE_ID=${CLICKUP_WORKSPACE_ID}
      - CLICKUP_STATUS_REVISADO=${CLICKUP_STATUS_REVISADO:-revisado}
      - CLICKUP_CAMPO_CLIENTE_ID=${CLICKUP_CAMPO_CLIENTE_ID}
      - PERFIL_FONTE=${PERFIL_FONTE:-clickup}
      - PERFIL_DOCS=${PERFIL_DOCS}
